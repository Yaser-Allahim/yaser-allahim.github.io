<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YSR.TV · Channel 02: Teletext</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
<style>
  :root {
    /* ---- the seven authentic teletext colours (softened just enough for a CRT) ---- */
    --tt-red:     #ff3239;
    --tt-green:   #2bf24f;
    --tt-yellow:  #ffe535;
    --tt-blue:    #2752ff;
    --tt-magenta: #ff58e4;
    --tt-cyan:    #22e9e9;
    --tt-white:   #f3f4ee;
    --tt-black:   #000000;

    --screenW: 1440px;   /* 4:3 teletext screen, pillar-boxed inside the 16:9 stage */
    --screenH: 1080px;

    --accent: var(--tt-cyan);   /* tweakable link / section accent */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'VT323', 'Courier New', monospace;
    -webkit-font-smoothing: none;
  }

  /* ---------- viewport scaler ---------- */
  #viewport {
    position: fixed;
    inset: 0;
    background: #000;
    overflow: hidden;
  }
  #stage {
    width: 1920px;
    height: 1080px;
    position: absolute;
    left: 50%; top: 50%;
    transform-origin: center center;
    overflow: hidden;
    background: #000;
    display: grid;
    place-items: center;
  }

  /* ========================================================= TELETEXT SCREEN */
  .tt-screen {
    position: relative;
    width: var(--screenW);
    height: var(--screenH);
    background: var(--tt-black);
    display: flex;
    flex-direction: column;
    font-size: 33px;
    line-height: 1.32;
    color: var(--tt-white);
    letter-spacing: 0.02em;
    overflow: hidden;
  }

  /* colour helpers */
  .r{color:var(--tt-red)} .g{color:var(--tt-green)} .y{color:var(--tt-yellow)}
  .b{color:var(--tt-blue)} .m{color:var(--tt-magenta)} .c{color:var(--tt-cyan)}
  .w{color:var(--tt-white)} .a{color:var(--accent)}
  b{font-weight:400}

  /* ---------------- HEADER ROW ---------------- */
  .tt-header {
    flex: none;
    height: 66px;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 40px;
    font-size: 30px;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .tt-header .hp {
    color: var(--tt-white);
    font-variant-numeric: tabular-nums;
    min-width: 175px;
  }
  .tt-header .hp .typing { color: var(--tt-yellow); }
  .tt-header .hident { flex: 1; }
  .tt-header .hident .chip {
    background: var(--tt-blue);
    color: var(--tt-yellow);
    padding: 0 10px;
  }
  .tt-header .hclock {
    color: var(--tt-white);
    font-variant-numeric: tabular-nums;
  }
  .tt-header .hclock .sec { color: var(--tt-cyan); }

  /* ---------------- PAGE CONTENT (scrolls) ---------------- */
  .tt-page {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--tt-blue) transparent;
  }
  .tt-page::-webkit-scrollbar { width: 14px; }
  .tt-page::-webkit-scrollbar-track { background: #06061a; }
  .tt-page::-webkit-scrollbar-thumb { background: var(--tt-blue); }
  .tt-page-inner {
    padding: 10px 52px 60px;
  }
  .tt-page.reveal .tt-page-inner {
    animation: ttReveal .5s steps(26) both;
  }
  @keyframes ttReveal {
    from { clip-path: inset(0 0 100% 0); }
    to   { clip-path: inset(0 0 0 0); }
  }

  /* mosaic rainbow rule — classic teletext separator */
  .tt-rainbow {
    display: flex;
    height: 22px;
    margin: 14px 0;
  }
  .tt-rainbow i { flex: 1; }
  .tt-rainbow i:nth-child(1){background:var(--tt-red)}
  .tt-rainbow i:nth-child(2){background:var(--tt-yellow)}
  .tt-rainbow i:nth-child(3){background:var(--tt-green)}
  .tt-rainbow i:nth-child(4){background:var(--tt-cyan)}
  .tt-rainbow i:nth-child(5){background:var(--tt-magenta)}
  .tt-rainbow i:nth-child(6){background:var(--tt-blue)}
  .tt-rainbow i:nth-child(7){background:var(--tt-white)}

  /* double-height heading */
  .dh {
    font-size: 60px;
    line-height: 1.04;
    letter-spacing: 0.01em;
    text-transform: uppercase;
  }

  /* a coloured section bar (text sits on a solid colour block) */
  .tt-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    white-space: nowrap;
    padding: 2px 16px 0;
    margin: 6px 0 18px;
    font-size: 34px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .tt-bar.bg-blue    { background: var(--tt-blue); }
  .tt-bar.bg-red     { background: var(--tt-red); }
  .tt-bar.bg-magenta { background: var(--tt-magenta); }
  .tt-bar.bg-green   { background: var(--tt-green); color: #000; }

  .tt-page p { margin: 0 0 18px; max-width: 30ch; }
  .tt-page .wide { max-width: 38ch; }
  .tt-meta { font-size: 30px; margin-bottom: 16px; }

  /* index listing rows */
  .tt-index { margin-top: 6px; }
  .tt-row {
    display: flex;
    align-items: baseline;
    gap: 14px;
    font-size: 36px;
    padding: 7px 0;
    cursor: pointer;
    letter-spacing: 0.03em;
  }
  .tt-row .num { color: var(--tt-green); min-width: 2.6ch; flex: none; }
  .tt-row .ttl { color: var(--tt-white); white-space: nowrap; flex: 0 1 auto; overflow: hidden; text-overflow: ellipsis; }
  .tt-row .lead {
    flex: 1;
    border-bottom: 4px dotted #2b2b55;
    transform: translateY(-8px);
    min-width: 18px;
  }
  .tt-row .go { color: var(--tt-cyan); min-width: 3ch; text-align: right; }
  .tt-row:hover .ttl { color: var(--tt-yellow); }
  .tt-row:hover { background: rgba(39,82,255,0.18); }

  /* image slot — markdown images land here */
  .tt-figure { margin: 8px 0 22px; max-width: 34ch; }
  .tt-figure .frame {
    border: 4px solid var(--tt-cyan);
    height: 320px;
    background:
      repeating-linear-gradient(135deg,
        rgba(34,233,233,0.10) 0 22px,
        rgba(39,82,255,0.10) 22px 44px),
      #05051a;
    display: grid;
    place-items: center;
    text-align: center;
    color: var(--tt-cyan);
    font-size: 28px;
    letter-spacing: 0.1em;
  }
  .tt-figure .frame img { width: 100%; height: 100%; object-fit: cover; display: block; image-rendering: pixelated; }
  .tt-figure figcaption { color: var(--tt-green); font-size: 28px; margin-top: 8px; }

  .tt-key { color: var(--tt-black); background: var(--tt-cyan); padding: 0 8px; }
  .tt-key[data-goto] { cursor: pointer; }

  /* markdown tables */
  .tt-table { border-collapse: collapse; margin: 4px 0 22px; font-size: 31px; }
  .tt-table th {
    color: var(--tt-yellow);
    text-align: left;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 2px 30px 6px 0;
    border-bottom: 4px solid var(--tt-blue);
  }
  .tt-table td {
    color: var(--tt-white);
    padding: 7px 30px 7px 0;
    border-bottom: 3px dotted #2b2b55;
  }
  .tt-table th:last-child, .tt-table td:last-child { padding-right: 0; }

  /* markdown bullet lists */
  .tt-list { margin: 0 0 18px; }
  .tt-list .li { display: flex; gap: 14px; max-width: 34ch; margin-bottom: 8px; }
  .tt-list .li-dot { color: var(--tt-yellow); flex: none; }

  /* markdown sub-headings (## text) */
  .tt-sub {
    color: var(--tt-green);
    font-size: 42px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin: 10px 0 12px;
  }

  /* not-in-service */
  .nis { text-align: center; padding-top: 40px; }
  .nis .big { font-size: 70px; color: var(--tt-red); margin: 18px 0 26px; }
  .nis .blink { animation: ttBlink 1s steps(1) infinite; }

  /* ---------------- FASTEXT ROW ---------------- */
  .tt-fastext {
    flex: none;
    height: 60px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
  }
  .tt-fastext button {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--tt-white);
    font-family: inherit;
    font-size: 30px;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 22px;
    cursor: pointer;
    text-align: left;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
  }
  .tt-fastext button::before {
    content: "";
    flex: none;
    width: 26px;
    height: 30px;
  }
  .tt-fastext .fx-red::before    { background: var(--tt-red); }
  .tt-fastext .fx-green::before  { background: var(--tt-green); }
  .tt-fastext .fx-yellow::before { background: var(--tt-yellow); }
  .tt-fastext .fx-cyan::before   { background: var(--tt-cyan); }
  .tt-fastext button:hover { background: rgba(255,255,255,0.08); }
  .tt-fastext button .lbl { overflow: hidden; text-overflow: ellipsis; }

  /* ====================================================== CRT GLASS ON TOP */
  .crt {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 60;
    background:
      repeating-linear-gradient(to bottom,
        rgba(0,0,0,0.16) 0px, rgba(0,0,0,0.16) 1.5px,
        transparent 3px, transparent 4.5px);
    mix-blend-mode: multiply;
    opacity: 0.55;
  }
  .crt::after {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(125% 120% at 50% 50%, transparent 72%, rgba(0,0,0,0.55) 100%);
  }
  .crt-glow .tt-screen { text-shadow: 0 0 7px currentColor; }
  #stage.no-crt .crt { display: none; }

  @keyframes ttBlink { 0%,49%{opacity:1} 50%,100%{opacity:0.15} }
  .blink { animation: ttBlink 1s steps(1) infinite; }
  #stage.paused .blink { animation-play-state: paused; }

  @media (prefers-reduced-motion: reduce) {
    .tt-page.reveal .tt-page-inner { animation: none; }
    .blink { animation: none; }
  }

  /* embedded in the YSR·TV shell: the shell's glass + eye-doctor settings own
     scanlines/vignette, so the internal CRT layer stays off */
  .crt { display: none; }
</style>
</head>
<body>
  <div id="viewport">
    <div id="stage" class="crt-glow">

      <!-- ===================== TELETEXT SCREEN (4:3, pillar-boxed) ===================== -->
      <div class="tt-screen" id="screen">

        <!-- HEADER -->
        <div class="tt-header">
          <span class="hp" id="pageNum">P100</span>
          <span class="hident"><b class="y">YSR</b><b class="c">.TV</b> <b class="chip">2</b> <b class="w">TELETEXT</b></span>
          <span class="hclock"><b id="hdate">Thu 11 Jun</b>&nbsp;&nbsp;<b id="hclock">00:00<b class="sec">/00</b></b></span>
        </div>

        <!-- PAGE BODY (rendered by JS) -->
        <div class="tt-page" id="page">
          <div class="tt-page-inner" id="pageInner"></div>
        </div>

        <!-- FASTEXT -->
        <div class="tt-fastext">
          <button class="fx-red"    data-act="prev"><span class="lbl">‹ Prev</span></button>
          <button class="fx-green"  data-act="next"><span class="lbl">Next ›</span></button>
          <button class="fx-yellow" data-act="index"><span class="lbl">Index 100</span></button>
          <button class="fx-cyan"   data-act="top"><span class="lbl">Top</span></button>
        </div>
      </div>

      <!-- CRT GLASS -->
      <div class="crt"></div>
    </div>
  </div>

<script>
(function () {
  "use strict";

  /* =====================================================================
     BLOG CONTENT — lives in /posts as plain Markdown. No HTML editing.
     • posts/manifest.json lists the page numbers: { "pages": [101, 102] }
     • posts/NNN.md = one page. Frontmatter + markdown body:

         ---
         page: 101
         section: BLOG
         bar: blue            (blue | red | magenta | green)
         title: FIRST LINE | SECOND LINE
         titleColor: y        (r g y b m c w)
         author: YASER
         date: 11 JUN 2026
         read: 4 MIN READ
         ---

         Plain paragraphs separated by blank lines.

         **bold** renders yellow · *italic* renders cyan ·
         `key` renders as a highlighted page key ·
         [102](#102) is a clickable page link ·
         {g}any colour{/} via tags r g y b m c w ·
         --- alone on a line = rainbow rule ·
         > quoted block = wide paragraph ·
         ![caption](../assets/shot.jpg) = framed figure
         ![caption](placeholder) = empty figure frame
     ===================================================================== */

  let PAGES = {};
  let POST_ORDER = [];
  let NAV_ORDER = [100];

  function rebuildOrders() {
    POST_ORDER = Object.keys(PAGES).map(Number).sort(function (a, b) { return a - b; });
    NAV_ORDER = [100].concat(POST_ORDER);
  }

  /* ------------------- tiny markdown → teletext ------------------- */
  const RAINBOW = '<div class="tt-rainbow"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>';

  function esc(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function inline(s) {
    s = esc(s);
    s = s.replace(/\*\*([^*]+)\*\*/g, '<span class="y">$1</span>');
    s = s.replace(/\*([^*]+)\*/g, '<span class="c">$1</span>');
    s = s.replace(/\[([^\]]+)\]\(#?(\d{3})\)/g, '<span class="tt-key" data-goto="$2">$1</span>');
    s = s.replace(/`([^`]+)`/g, '<span class="tt-key">$1</span>');
    s = s.replace(/\{(r|g|y|b|m|c|w)\}/g, '<span class="$1">');
    s = s.replace(/\{\/\}/g, '</span>');
    return s;
  }
  function mdToTeletext(md) {
    return md.split(/\n\s*\n/).map(function (b) { return b.trim(); }).filter(Boolean).map(function (block) {
      if (/^-{3,}$/.test(block)) return RAINBOW;
      const img = block.match(/^!\[([^\]]*)\]\(([^)]+)\)\s*$/);
      if (img) {
        const cap = img[1], src = img[2];
        const innerHtml = (src === "placeholder")
          ? '▚ IMAGE ▚<br><span style="font-size:22px">drop a screenshot here</span>'
          : '<img src="' + esc(src) + '" alt="' + esc(cap) + '">';
        return '<figure class="tt-figure"><div class="frame">' + innerHtml + '</div>' +
               (cap ? '<figcaption>' + inline(cap) + '</figcaption>' : '') + '</figure>';
      }
      if (/^\|/.test(block)) {
        const lines = block.split("\n").map(function (l) { return l.trim(); }).filter(function (l) { return /^\|/.test(l); });
        const cells = function (l) { return l.replace(/^\|/, "").replace(/\|$/, "").split("|").map(function (c) { return c.trim(); }); };
        let head = null;
        const rows = [];
        lines.forEach(function (l) {
          if (/^[\s|:-]+$/.test(l) && l.indexOf("-") !== -1) return;   // |---|---| separator
          if (!head) head = cells(l); else rows.push(cells(l));
        });
        let t = '<table class="tt-table">';
        if (head) t += '<tr>' + head.map(function (c) { return '<th>' + inline(c) + '</th>'; }).join("") + '</tr>';
        rows.forEach(function (r) { t += '<tr>' + r.map(function (c) { return '<td>' + inline(c) + '</td>'; }).join("") + '</tr>'; });
        return t + '</table>';
      }
      if (block.split("\n").every(function (l) { return /^-\s/.test(l.trim()); })) {
        return '<div class="tt-list">' + block.split("\n").map(function (l) {
          return '<div class="li"><span class="li-dot">■</span><span>' + inline(l.trim().replace(/^-\s+/, "")) + '</span></div>';
        }).join("") + '</div>';
      }
      if (/^##\s+/.test(block)) {
        return '<div class="tt-sub">' + inline(block.replace(/^##\s+/, "").replace(/\n/g, " ")) + '</div>';
      }
      if (/^>\s/.test(block)) {
        return '<p class="wide">' + inline(block.replace(/^>\s?/gm, "").replace(/\n/g, " ")) + '</p>';
      }
      return '<p>' + inline(block.replace(/\n/g, " ")) + '</p>';
    });
  }
  function parsePost(txt) {
    const m = txt.replace(/\r\n/g, "\n").match(/^---\s*\n([\s\S]*?)\n---\s*\n?([\s\S]*)$/);
    if (!m) return null;
    const meta = {};
    m[1].split("\n").forEach(function (line) {
      const i = line.indexOf(":");
      if (i > 0) meta[line.slice(0, i).trim()] = line.slice(i + 1).trim();
    });
    return {
      section: meta.section || "BLOG",
      bar: "bg-" + (meta.bar || "blue"),
      title: (meta.title || "UNTITLED").split("|").map(function (s) { return s.trim(); }),
      titleColor: meta.titleColor || "y",
      meta: '<span class="c">' + esc(meta.author || "YASER") + '</span>' +
            (meta.date ? " · " + esc(meta.date) : "") +
            (meta.read ? " · " + esc(meta.read) : ""),
      body: mdToTeletext(m[2])
    };
  }

  const FILE_MODE = location.protocol === "file:";   // fetch() is blocked on file:// — no posts can load

  async function loadPosts() {
    if (!FILE_MODE) {
      try {
        const mf = await (await fetch("../posts/manifest.json", { cache: "no-store" })).json();
        const results = await Promise.all((mf.pages || []).map(async function (n) {
          try {
            const txt = await (await fetch("../posts/" + n + ".md", { cache: "no-store" })).text();
            return [n, parsePost(txt)];
          } catch (e) { return [n, null]; }
        }));
        results.forEach(function (r) { if (r[1]) PAGES[r[0]] = r[1]; });
      } catch (e) { /* antenna's loose — index shows the empty state */ }
    }
    rebuildOrders();
    show(current, { noReveal: true });
  }

  /* ----------------------------- elements ----------------------------- */
  const stage    = document.getElementById("stage");
  const pageEl   = document.getElementById("page");
  const innerEl  = document.getElementById("pageInner");
  const pageNum  = document.getElementById("pageNum");

  /* ----------------------------- render: INDEX (100) ------------------- */
  function renderIndex() {
    let rows = POST_ORDER.map(function (n) {
      const p = PAGES[n];
      const t = (p.title.join(" ")).replace(/\s+/g, " ");
      return '<div class="tt-row" data-goto="' + n + '">' +
               '<span class="num">' + n + '</span>' +
               '<span class="ttl">' + t + '</span>' +
               '<span class="lead"></span>' +
               '<span class="go">' + n + '</span>' +
             '</div>';
    }).join("");
    if (!POST_ORDER.length) {
      rows = FILE_MODE
        ? '<div class="r" style="font-size:34px">NO ANTENNA SIGNAL</div>' +
          '<p class="w" style="font-size:30px;max-width:38ch;margin-top:10px">This set was opened straight from a file. ' +
          'The text service broadcasts over <span class="c">http</span> — ' +
          'double-click <span class="tt-key">start-tv.cmd</span> in the station folder and the TV will open properly tuned.</p>'
        : '<div class="r" style="font-size:32px">NO PAGES ON AIR — CHECK THE ANTENNA (posts/ folder)</div>';
    }

    return '' +
      '<div class="dh"><span class="y">YSR.TV</span></div>' +
      '<div class="c" style="font-size:34px;letter-spacing:0.34em;margin-top:2px">T E L E T E X T &nbsp; 2 0 0</div>' +
      RAINBOW +
      '<div class="tt-bar bg-blue"><span class="y">INDEX</span><span class="w">PAGE 100</span></div>' +
      '<div class="g" style="font-size:30px;margin-bottom:6px">SELECT A PAGE — TYPE ITS NUMBER</div>' +
      '<div class="tt-index">' + rows + '</div>' +
      RAINBOW +
      '<p class="w" style="font-size:28px;max-width:40ch">Type a 3-digit page number on your keyboard ' +
        'to jump. Pages ' + NAV_ORDER.join(", ") + ' are broadcasting. ' +
        'Everything else is <span class="r">not in service</span> — yet.</p>';
  }

  /* ----------------------------- render: POST ------------------------- */
  function renderPost(p, n) {
    const tc = p.titleColor || "y";
    const titleHtml = p.title.map(function (l) {
      return '<div class="dh"><span class="' + tc + '">' + l + '</span></div>';
    }).join("");
    return '' +
      '<div class="tt-bar ' + (p.bar || "bg-blue") + '">' +
        '<span class="y">' + (p.section || "BLOG") + '</span>' +
        '<span class="w">PAGE ' + n + '</span>' +
      '</div>' +
      titleHtml +
      '<div class="tt-meta w">' + (p.meta || "") + '</div>' +
      RAINBOW +
      p.body.join("");
  }

  /* ----------------------------- render: NOT IN SERVICE --------------- */
  function renderNIS(n) {
    const list = NAV_ORDER.map(function (x) {
      const label = x === 100 ? "Index" : PAGES[x].title.join(" ");
      return '<div class="tt-row" data-goto="' + x + '">' +
               '<span class="num">' + x + '</span>' +
               '<span class="ttl">' + label + '</span>' +
               '<span class="lead"></span>' +
               '<span class="go">' + x + '</span>' +
             '</div>';
    }).join("");
    return '' +
      '<div class="nis">' +
        RAINBOW +
        '<div class="dh"><span class="r">PAGE ' + n + '</span></div>' +
        '<div class="big blink">NOT IN SERVICE</div>' +
        '<p class="w" style="margin:0 auto 22px;max-width:30ch">This page is not currently being broadcast on Channel 2.</p>' +
        '<div class="c" style="font-size:30px;margin-bottom:8px">NOW SHOWING</div>' +
      '</div>' +
      '<div class="tt-index" style="max-width:30ch;margin:0 auto">' + list + '</div>';
  }

  /* ----------------------------- navigation --------------------------- */
  let current = 100;

  function show(n, opts) {
    opts = opts || {};
    current = n;
    try { localStorage.setItem("ysrtv_tt_page", String(n)); } catch (e) {}

    setPageNumDisplay(n);

    let html;
    if (n === 100) html = renderIndex();
    else if (PAGES[n]) html = renderPost(PAGES[n], n);
    else html = renderNIS(n);
    innerEl.innerHTML = html;

    pageEl.scrollTop = 0;
    updateFastextLabels();

    // reveal "paint" animation
    if (revealOn && !opts.noReveal) {
      pageEl.classList.remove("reveal");
      void pageEl.offsetWidth;               // force reflow
      pageEl.classList.add("reveal");
    }
  }

  // header page-number readout (shows typing buffer with dashes)
  function setPageNumDisplay(n) {
    if (buffer.length) {
      const padded = (buffer + "---").slice(0, 3);
      pageNum.innerHTML = 'P<span class="typing">' + padded + '</span>';
    } else {
      pageNum.textContent = "P" + n;
    }
  }

  function updateFastextLabels() {
    const i = NAV_ORDER.indexOf(current);
    const prevN = NAV_ORDER[(i - 1 + NAV_ORDER.length) % NAV_ORDER.length];
    const nextN = NAV_ORDER[(i + 1) % NAV_ORDER.length];
    const fx = document.querySelectorAll(".tt-fastext button .lbl");
    fx[0].textContent = "‹ " + prevN;
    fx[1].textContent = nextN + " ›";
    // yellow + cyan stay Index / Top
  }

  function jump(n) {
    show(n);                 // NIS page still shows the number the user dialled
  }

  function relative(dir) {
    const i = NAV_ORDER.indexOf(current);
    const ni = i === -1
      ? 0
      : (i + dir + NAV_ORDER.length) % NAV_ORDER.length;
    show(NAV_ORDER[ni]);
  }

  /* ----------------------------- number entry ------------------------- */
  let buffer = "";
  let bufTimer = null;

  function handleDigit(d) {
    buffer = (buffer + d).slice(-3);
    setPageNumDisplay(current);
    clearTimeout(bufTimer);
    if (buffer.length === 3) {
      const n = parseInt(buffer, 10);
      buffer = "";
      jump(n);
    } else {
      // give the dialler ~2.2s to finish the number, else reset
      bufTimer = setTimeout(function () { buffer = ""; setPageNumDisplay(current); }, 2200);
    }
  }
  function backspace() {
    buffer = buffer.slice(0, -1);
    clearTimeout(bufTimer);
    setPageNumDisplay(current);
  }

  document.addEventListener("keydown", function (e) {
    const tag = (e.target && e.target.tagName) || "";
    if (/^(INPUT|TEXTAREA|SELECT)$/.test(tag)) return;
    if (/^[0-9]$/.test(e.key)) { handleDigit(e.key); e.preventDefault(); }
    else if (e.key === "Backspace") { backspace(); e.preventDefault(); }
    else if (e.key === "ArrowRight" || e.key === "ArrowDown") { relative(1); }
    else if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   { relative(-1); }
    else if (e.key === "Home" || e.key.toLowerCase() === "i") { show(100); }
  });

  /* clicks: index rows, fastext, remote, in-text page keys */
  document.addEventListener("click", function (e) {
    const goEl = e.target.closest("[data-goto]");
    if (goEl) { jump(parseInt(goEl.getAttribute("data-goto"), 10)); return; }

    const actEl = e.target.closest("[data-act]");
    if (actEl) {
      const act = actEl.getAttribute("data-act");
      if (act === "prev")  relative(-1);
      else if (act === "next")  relative(1);
      else if (act === "index") show(100);
      else if (act === "back")  backspace();
      else if (act === "top")   pageEl.scrollTo({ top: 0, behavior: "smooth" });
    }
  });

  /* ----------------------------- header clock ------------------------- */
  const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const MONS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const dateEl  = document.getElementById("hdate");
  const clockEl = document.getElementById("hclock");
  function tickClock() {
    const d = new Date();
    dateEl.textContent = DAYS[d.getDay()] + " " + String(d.getDate()).padStart(2,"0") + " " + MONS[d.getMonth()];
    const hh = String(d.getHours()).padStart(2,"0");
    const mm = String(d.getMinutes()).padStart(2,"0");
    const ss = String(d.getSeconds()).padStart(2,"0");
    clockEl.innerHTML = hh + ":" + mm + '<span class="sec">/' + ss + "</span>";
  }
  tickClock();

  /* ----------------------------- reveal toggle ------------------------ */
  let revealOn = true;
  window.__ttSetReveal = function (v) { revealOn = !!v; };

  /* ----------------------------- viewport scaling --------------------- */
  function fit() {
    const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    stage.style.transform = "translate(-50%,-50%) scale(" + s + ")";
  }
  window.addEventListener("resize", fit);
  fit();
  /* the shell loads this document while the channel is hidden, so the first
     fit() measures a bogus viewport — refit whenever our real size changes */
  if (window.ResizeObserver) {
    new ResizeObserver(fit).observe(document.documentElement);
  }

  /* ----------------------------- channel play/pause API --------------- */
  let clockTimer = null;
  const Channel = {
    isPlaying: false,
    play() {
      fit();
      if (this.isPlaying) return;
      this.isPlaying = true;
      stage.classList.remove("paused");
      tickClock();
      clockTimer = setInterval(tickClock, 1000);
    },
    pause() {
      this.isPlaying = false;
      stage.classList.add("paused");
      clearInterval(clockTimer); clockTimer = null;
    },
    toggle() { this.isPlaying ? this.pause() : this.play(); },
    goTo(n) { jump(n); }
  };
  window.YSRChannel = Channel;

  document.addEventListener("visibilitychange", function () {
    if (document.hidden) Channel.pause(); else Channel.play();
  });
  window.addEventListener("message", function (e) {
    const d = e.data || {};
    if (d.type !== "channel" && d.channel == null) return;
    const action = d.action || d.channel;
    if (action === "play" || action === "show" || action === "enter") Channel.play();
    else if (action === "pause" || action === "hide" || action === "leave") Channel.pause();
    if (typeof d.page === "number") jump(d.page);
    if (typeof d.digit === "string" && /^[0-9]$/.test(d.digit)) handleDigit(d.digit);
    if (d.key === "Backspace") backspace();
  });

  /* ----------------------------- boot --------------------------------- */
  // restore last page (or honour ?page=NNN), default to the index
  const params = new URLSearchParams(location.search);
  let startPage = 100;
  const qp = parseInt(params.get("page"), 10);
  if (!isNaN(qp)) startPage = qp;
  else {
    const saved = parseInt(localStorage.getItem("ysrtv_tt_page"), 10);
    if (!isNaN(saved)) startPage = saved;
  }
  show(startPage, { noReveal: true });
  loadPosts();

  if (params.get("paused") === "1" || params.get("static") === "1") Channel.pause();
  else Channel.play();
})();
</script>
