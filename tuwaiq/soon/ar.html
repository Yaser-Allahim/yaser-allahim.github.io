<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نادي طويق — قريباً</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700&family=Bungee&display=swap" rel="stylesheet" />
  <style>
    :root {
      --purple:       #4f29b7;
      --purple-light: #a380ff;
      --purple-dark:  #3a1e8a;
      --dark:         #262626;
      --off-white:    #ededed;
      --cyan:         #57e3d8;
      --orange:       #f4a664;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background: var(--dark);
      color: var(--off-white);
      overflow-x: hidden;
    }

    .lang-toggle {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 100;
      text-decoration: none;
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      color: var(--purple);
      background: var(--off-white);
      padding: 0.4rem 1rem;
      border-radius: 100px;
      transition: background 0.25s, color 0.25s, transform 0.2s;
    }
    .lang-toggle:hover {
      background: var(--cyan);
      color: var(--dark);
      transform: translateY(-2px);
    }

    .hero {
      min-height: 100vh;
      background: var(--purple);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 6rem 2rem 5rem;
    }

    .hero::before,
    .hero::after {
      content: '';
      position: absolute;
      border-radius: 4px;
      opacity: 0.18;
      animation: floatDrift 9s ease-in-out infinite;
    }
    .hero::before {
      width: 180px; height: 180px;
      background: var(--cyan);
      top: -40px; right: -40px;
      animation-delay: 0s;
    }
    .hero::after {
      width: 120px; height: 120px;
      background: var(--orange);
      bottom: 60px; left: -30px;
      animation-delay: -4s;
    }

    .deco-dot {
      position: absolute;
      border-radius: 4px;
      opacity: 0.12;
      animation: floatDrift 11s ease-in-out infinite;
    }
    .deco-dot.d1 { width:80px; height:80px; background:var(--purple-light); top:15%; left:10%; animation-delay:-2s; }
    .deco-dot.d2 { width:50px; height:50px; background:var(--cyan); bottom:20%; right:8%; animation-delay:-6s; }
    .deco-dot.d3 { width:30px; height:30px; background:var(--orange); top:60%; left:20%; animation-delay:-3s; }

    @keyframes floatDrift {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-24px) rotate(6deg); }
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      animation: fadeUp 0.9s ease both;
    }

    .logo-wordmark {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .logo-wordmark .pixel-plus { order: -1; }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1;
      text-align: right;
    }
    .logo-text .tuwaiq {
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 700;
      color: var(--off-white);
      letter-spacing: -0.01em;
    }
    .logo-text .club {
      font-family: 'Bungee', sans-serif;
      font-size: clamp(1rem, 2.2vw, 1.5rem);
      font-weight: 400;
      color: var(--off-white);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .pixel-plus {
      position: relative;
      direction: ltr;
      cursor: pointer;
      width: clamp(32px, 3.6vw, 46px);
      height: clamp(48px, 5.4vw, 69px);
      flex-shrink: 0;
      animation: pulsePlus 3.5s ease-in-out infinite;
    }
    .pixel-plus span {
      position: absolute;
      width: 50%;
      aspect-ratio: 1;
      border-radius: 22%;
    }
    .pixel-plus span.off    { display: none; }
    .pixel-plus span.cyan   { top: 0;         left:  0; background: var(--cyan); }
    .pixel-plus span.orange { top: 33.33%;    right: 0; background: var(--orange); }
    .pixel-plus span.purple { top: 66.67%;    left:  0; background: var(--purple-light); }

    @keyframes pulsePlus {
      0%,100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.08); opacity: 0.88; }
    }

    .logo-tagline {
      font-size: clamp(0.7rem, 1.6vw, 0.85rem);
      font-weight: 400;
      color: rgba(237,237,237,0.55);
      letter-spacing: 0.05em;
    }

    .coming-soon {
      margin-top: 2.5rem;
      text-align: center;
      animation: fadeUp 1.1s 0.2s ease both;
    }

    .coming-soon h1 {
      font-size: clamp(3rem, 9vw, 6.5rem);
      font-weight: 700;
      color: var(--off-white);
      line-height: 1;
      position: relative;
      display: inline-block;
    }

    .coming-soon h1::after {
      content: '';
      display: block;
      height: 4px;
      background: linear-gradient(270deg, var(--cyan), var(--purple-light));
      border-radius: 2px;
      margin-top: 0.3rem;
      animation: slideIn 1s 0.6s ease both;
      transform-origin: right;
    }

    @keyframes slideIn {
      from { transform: scaleX(0); opacity: 0; }
      to   { transform: scaleX(1); opacity: 1; }
    }

    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0.5;
      animation: fadeUp 1.4s 0.8s ease both;
    }
    .scroll-hint span {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--off-white);
    }
    .scroll-hint .arrow {
      width: 18px; height: 18px;
      border-right: 2px solid var(--off-white);
      border-bottom: 2px solid var(--off-white);
      transform: rotate(45deg);
      animation: bounce 1.8s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100% { transform: rotate(45deg) translateY(0); }
      50%      { transform: rotate(45deg) translateY(5px); }
    }

    .sponsors {
      background: var(--dark);
      padding: 6rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }

    .section-label {
      font-size: clamp(0.65rem, 1.5vw, 0.75rem);
      font-weight: 500;
      letter-spacing: 0.15em;
      color: var(--cyan);
    }

    .section-title {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      color: var(--off-white);
      text-align: center;
      margin-top: 0.4rem;
    }

    .sponsors-divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(270deg, var(--cyan), var(--purple-light));
      border-radius: 2px;
    }

    .sponsors-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 3rem 5rem;
      align-items: center;
      justify-content: center;
    }

    .sponsor-card {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.8rem 2.5rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      transition: border-color 0.3s, background 0.3s, transform 0.25s;
      text-decoration: none;
      cursor: pointer;
    }
    .sponsor-card:hover {
      border-color: rgba(87,227,216,0.35);
      background: rgba(87,227,216,0.06);
      transform: translateY(-4px);
    }

    .sponsor-card img {
      height: 52px;
      width: auto;
      max-width: 160px;
      object-fit: contain;
      transition: filter 0.3s, opacity 0.3s;
    }

    .sponsor-card img.logo-aws {
      filter: brightness(0) invert(1);
      opacity: 0.75;
    }
    .sponsor-card:hover img.logo-aws {
      opacity: 1;
    }

    .sponsor-card img.logo-ksu {
      height: 64px;
      filter: grayscale(1) brightness(1.8) contrast(0.75);
      opacity: 0.85;
    }
    .sponsor-card:hover img.logo-ksu {
      filter: grayscale(0) brightness(1.1) contrast(1);
      opacity: 1;
    }

    .farewell {
      background: linear-gradient(160deg, var(--purple-dark) 0%, var(--purple) 50%, #6b3fd4 100%);
      padding: 7rem 2rem 5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .farewell::before {
      content: '';
      position: absolute;
      width: 250px; height: 250px;
      background: rgba(87,227,216,0.08);
      border-radius: 24px;
      bottom: -80px; right: -80px;
      transform: rotate(-20deg);
    }
    .farewell::after {
      content: '';
      position: absolute;
      width: 160px; height: 160px;
      background: rgba(244,166,100,0.08);
      border-radius: 16px;
      top: -40px; left: -40px;
      transform: rotate(15deg);
    }

    .farewell h2 {
      font-size: clamp(2.2rem, 6vw, 5rem);
      font-weight: 700;
      color: var(--off-white);
      line-height: 1.2;
    }

    .farewell p {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 400;
      color: rgba(237,237,237,0.7);
      max-width: 520px;
      line-height: 1.8;
    }

    .farewell-footer {
      margin-top: 3.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      position: relative;
      z-index: 1;
    }

    .footer-logo-text {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .footer-logo-text .tuwaiq-sm {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--off-white);
      letter-spacing: -0.01em;
    }
    .footer-logo-text .club-sm {
      font-size: 0.55rem;
      font-weight: 500;
      color: var(--cyan);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      line-height: 1;
    }
    .footer-logo-label {
      display: flex;
      flex-direction: column;
      line-height: 1;
      text-align: right;
    }

    .footer-pixel-plus {
      position: relative;
      direction: ltr;
      width: 18px;
      height: 27px;
      flex-shrink: 0;
      order: -1;
    }
    .footer-pixel-plus span {
      position: absolute;
      width: 50%;
      aspect-ratio: 1;
      border-radius: 22%;
    }

    .sponsor-card img.logo-tuwaiq {
      height: 52px;
      filter: brightness(0) invert(1);
      opacity: 0.8;
    }
    .sponsor-card:hover img.logo-tuwaiq {
      opacity: 1;
    }

    .footer-copy {
      font-size: 0.7rem;
      color: rgba(237,237,237,0.3);
      letter-spacing: 0.05em;
      margin-top: 0.5rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 600px) {
      .sponsors-grid { gap: 2rem; }
      .sponsor-card  { padding: 1.4rem 2rem; }
      .sponsor-card img { height: 38px; max-width: 120px; }
      .sponsor-card img.logo-ksu { height: 48px; }
    }

    /* ── Socials Section ─────────────────────── */
    .socials-section {
      background: var(--dark);
      padding: 6rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    .socials-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
      width: 100%;
      max-width: 960px;
    }

    .social-card {
      flex: 1 1 380px;
      max-width: 460px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 1.6rem 1.8rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: border-color 0.3s, background 0.3s;
    }
    .social-card:hover {
      border-color: rgba(87,227,216,0.3);
      background: rgba(87,227,216,0.04);
    }

    .social-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: var(--off-white);
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
    }
    .social-header svg { flex-shrink: 0; }

    .social-post-text {
      color: rgba(237,237,237,0.82);
      font-size: 0.92rem;
      line-height: 1.65;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 3.5rem;
      text-align: right;
    }

    .social-post-date {
      font-size: 0.75rem;
      color: rgba(237,237,237,0.38);
      letter-spacing: 0.03em;
      text-align: right;
    }

    .social-read-more {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--cyan);
      text-decoration: none;
      transition: opacity 0.2s;
      margin-top: auto;
      align-self: flex-end;
    }
    .social-read-more:hover { opacity: 0.7; }

    .social-divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(270deg, var(--cyan), var(--purple-light));
      border-radius: 2px;
    }

    @keyframes skel-pulse { 0%,100%{opacity:.35} 50%{opacity:.65} }
    .skel {
      background: rgba(255,255,255,0.1);
      border-radius: 6px;
      animation: skel-pulse 1.4s ease infinite;
    }
    .skel-line { height: 0.8rem; margin-bottom: 0.5rem; display: block; }

    @media (max-width: 600px) {
      .social-card { flex-basis: 100%; max-width: 100%; }
    }
  </style>
</head>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>

  <script>
    (function () {
      var loaded = false;

      function launch() {
        if (loaded) { window.TuwaiqSnake.init(reattach); return; }
        var s = document.createElement('script');
        s.src = 'snake.js';
        s.onload = function () { loaded = true; window.TuwaiqSnake.init(reattach); };
        document.head.appendChild(s);
      }

      function onKey(e) {
        if (!['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) return;
        if (window.scrollY > 80) return;
        e.preventDefault();
        detach(); launch();
      }

      function onClick() { detach(); launch(); }

      function attach() {
        window.addEventListener('keydown', onKey);
        var logo = document.querySelector('.pixel-plus');
        if (logo) logo.addEventListener('click', onClick);
      }

      function detach() {
        window.removeEventListener('keydown', onKey);
        var logo = document.querySelector('.pixel-plus');
        if (logo) logo.removeEventListener('click', onClick);
      }

      function reattach() { attach(); }

      attach();
    })();
  </script>

  <script>
    (function () {
      var loaded = false;
      var clicks = 0, clickTimer;

      function launch() {
        if (loaded) { window.TuwaiqClicker.init(null); return; }
        var s = document.createElement('script');
        s.src = 'clicker.js';
        s.onload = function () { loaded = true; window.TuwaiqClicker.init(null); };
        document.head.appendChild(s);
      }

      var el = document.getElementById('clicker-trigger');
      if (el) {
        el.addEventListener('click', function () {
          clicks++;
          clearTimeout(clickTimer);
          clickTimer = setTimeout(function () { clicks = 0; }, 2000);
          if (clicks >= 5) { clicks = 0; clearTimeout(clickTimer); launch(); }
        });
      }
    })();
  </script>

        var s = document.createElement('script');
        s.src = 'golf.js';
        s.onload = function () { loaded = true; window.TuwaiqGolf.init(null); };
        document.head.appendChild(s);
      }
      function onKey(e) {
        if (e.key !== 'g' && e.key !== 'G') return;
        if (window.scrollY > 120) return;
        e.preventDefault();
        window.removeEventListener('keydown', onKey);
        launch();
      }
      window.addEventListener('keydown', onKey);
    })();
  </script>

  <!-- ── X (Twitter) latest post fetch ──────────────────── -->
  <script>
    (function () {
      var WORKER_URL = 'social-feed.json';

      var textEl = document.getElementById('x-post-text');
      var dateEl = document.getElementById('x-post-date');
      var linkEl = document.getElementById('x-post-link');

      function showFallback() {
        if (textEl) textEl.textContent = 'تفضل بزيارة حسابنا على X للاطلاع على آخر التحديثات.';
      }

      fetch(WORKER_URL)
        .then(function (r) {
          if (!r.ok) throw new Error('bad response');
          return r.json();
        })
        .then(function (posts) {
          if (!posts || !posts.length) throw new Error('empty');
          var p = posts[0];
          if (textEl) {
            var escaped = p.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            var linked = escaped.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--cyan);word-break:break-all;">$1</a>');
            textEl.innerHTML = linked.replace(/\n/g, '<br>');
            if (p.media) {
              var img = document.createElement('img');
              img.src = p.media;
              img.alt = '';
              img.style.cssText = 'width:100%;border-radius:8px;margin-top:0.5rem;object-fit:cover;max-height:220px;';
              textEl.parentNode.insertBefore(img, textEl.nextSibling);
            }
          }
          if (dateEl && p.date) {
            try {
              dateEl.textContent = new Date(p.date).toLocaleDateString('ar-SA', {
                year: 'numeric', month: 'short', day: 'numeric'
              });
            } catch (e) { dateEl.textContent = p.date; }
          }
          if (linkEl && p.link) linkEl.href = p.link;
        })
        .catch(showFallback);
    })();
  </script>
