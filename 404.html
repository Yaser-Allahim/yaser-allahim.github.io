<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>no signal · YSR·TV</title>
<meta name="theme-color" content="#0a0b0e">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  html,body{margin:0;height:100%;background:#0a0b0e;overflow:hidden;font-family:'Courier New',monospace;}
  #snow{position:fixed;inset:0;width:100%;height:100%;image-rendering:pixelated;}
  #scan{position:fixed;inset:0;pointer-events:none;
    background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0 2px,rgba(0,0,0,0.14) 2px 4px);}
  #msg{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;color:#e8e6e1;text-shadow:0 2px 12px rgba(0,0,0,0.8);padding:24px;}
  #msg b{font-size:clamp(28px,7vw,64px);letter-spacing:0.18em;color:#ff5c5c;font-weight:700;}
  #msg p{margin:18px 0 0;font-size:14px;line-height:1.9;letter-spacing:1px;color:rgba(232,230,225,0.7);}
  #msg a{display:inline-block;margin-top:26px;color:#45ff9c;text-decoration:none;
    border:1px solid rgba(69,255,156,0.4);border-radius:4px;padding:9px 16px;font-size:13px;letter-spacing:1px;}
  #msg a:hover{background:rgba(69,255,156,0.1);}
</style>
</head>
<body>
<canvas id="snow"></canvas>
<div id="scan"></div>
<div id="msg">
  <b>NO SIGNAL</b>
  <p>the channel you tried to reach isn't on the air.<br>it may have been retired, or it never existed at all.</p>
  <a href="/">return to YSR·TV</a>
</div>
<script>
  var cv = document.getElementById('snow');
  var ctx = cv.getContext('2d');
  var still = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  function size(){ cv.width = 320; cv.height = Math.round(320 * innerHeight / innerWidth) || 180; }
  function draw(){
    var img = ctx.createImageData(cv.width, cv.height);
    var d = img.data;
    for(var i = 0; i < d.length; i += 4){
      var v = (Math.random() * 255) | 0;
      d[i] = d[i+1] = d[i+2] = v; d[i+3] = 255;
    }
    ctx.putImageData(img, 0, 0);
  }
  size(); draw();
  addEventListener('resize', function(){ size(); draw(); });
  if(!still) (function loop(){ draw(); setTimeout(loop, 70); })();
</script>
</body>
</html>
